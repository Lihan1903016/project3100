<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>

<body>
    <div class="linkbox">
        <marquee direction="bottom">
            <h1 class="notice">CT Result Uploaded.Click the link to get your result.</h1>
        </marquee>
        <a href="CTresultbySearch.html" target="_blank">Click here to search your Marks</a>
    </div>
</body>
<style>
    body {
        min-height: 80vh;
        background: url('/Image/l.jpg');
        display: flex;
        justify-content: center;
    }
    
    .notice {
        text-align: center;
        font-size: 1.5em;
        font-family: cursive;
        color: red;
        box-shadow: 0 0 10px white;
    }
    
    .linkbox {
        display: block;
        justify-content: center;
        align-items: center;
        text-align: center;
        width: 660px;
        border-radius: 10px;
        color: white;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        text-decoration: none;
    }
    
    .linkbox a {
        display: inline-flex;
        justify-content: center;
        margin-top: 2%;
        width: 250px;
        color: rgb(255, 255, 255);
        font-weight: bolder;
        font-size: .9em;
        font-family: cursive;
        text-decoration: none;
        border-radius: 10px;
        background: transparent;
        backdrop-filter: blur(80px);
        box-shadow: 0 5px 5px rgb(8, 255, 99);
    }
    
    .linkbox a:hover {
        background: white;
        color: green;
    }
</style>
<script src="index.js"></script>

</html>
